services:
  api:
    build:
      context: .
      dockerfile: api/dockerfile
      secrets:
        - supabase_url
        - supabase_key
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: opengym-app/Dockerfile
      args:
        NEXT_PUBLIC_FASTAPI_URL: ${NEXT_PUBLIC_FASTAPI_URL:-http://localhost:8000}
    ports:
      - "80:3000"
    depends_on:
      - api
    restart: unless-stopped

secrets:
  supabase_url:
    environment: SUPABASE_URL
  supabase_key:
    environment: SUPABASE_KEY
